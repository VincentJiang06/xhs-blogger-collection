const grid = document.getElementById('grid'), nav = document.getElementById('nav');
const lb = document.getElementById('lightbox'), lbimg = document.getElementById('lbimg');
lb.onclick = () => lb.style.display = 'none';

function fmtFans(n){ return n >= 10000 ? (n/10000).toFixed(1).replace(/\.0$/,'') + '万' : n; }
function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

document.getElementById('stats').innerHTML = P.cats.map(c =>
  `<div class="stat"><b>${P.data[c.key].length}</b>${c.icon} ${c.label}</div>`).join('') +
  `<div class="stat"><b>${P.cats.reduce((s,c)=>s+P.data[c.key].length,0)}</b>✅ 总计</div>`;

P.cats.forEach((c, k) => {
  const b = document.createElement('button');
  b.innerHTML = `${c.icon} ${c.label}<span class="n">${P.data[c.key].length}</span>`;
  b.onclick = () => show(c.key, b);
  nav.appendChild(b);
  if (k === 0) show(c.key, b);
});

function show(key, btn) {
  document.querySelectorAll('nav button').forEach(x => x.classList.remove('on'));
  btn.classList.add('on');
  const list = P.data[key];
  grid.innerHTML = list.map((r, idx) => `
    <div class="card">
      <div class="cover" onclick="zoom('${r.shot}')">
        <img loading="lazy" src="${r.shot}" alt="">
        <span class="rank">No.${idx+1}</span>
        ${r.followed ? '<span class="badge done">已关注</span>' : '<span class="badge">未关注</span>'}
      </div>
      <div class="body">
        <div class="who">
          ${r.avatar ? `<img loading="lazy" referrerpolicy="no-referrer" src="${esc(r.avatar)}" alt="">` : ''}
          <div><div class="nm">${esc(r.name)}</div><div class="rid">小红书号：${esc(r.redId)||'—'}</div></div>
        </div>
        <div class="nums"><span>粉丝 <b>${fmtFans(r.fans)}</b></span><span>笔记 <b>${r.notes ?? '—'}${r.notesCapped ? '+' : ''}</b></span></div>
        <div class="feat">${esc(r.feature)}</div>
        ${r.desc ? `<div class="desc">${esc(r.desc)}</div>` : ''}
        <div class="titles">${(r.titles||[]).slice(0,3).map(t=>`<span>· ${esc(t)}</span>`).join('')}</div>
      </div>
    </div>`).join('');
  window.scrollTo({top:0});
}
function zoom(src){ lbimg.src = src; lb.style.display = 'flex'; }
